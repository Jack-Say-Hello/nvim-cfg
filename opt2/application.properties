# ===============================
# \u6570\u636E\u6E90\u914D\u7F6E
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=!QAZ2wsx
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池配置
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000

# Redis 配置
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=3000ms

# Redis 连接池配置
spring.redis.lettuce.pool.max-active=200
spring.redis.lettuce.pool.max-idle=50
spring.redis.lettuce.pool.min-idle=20
spring.redis.lettuce.pool.max-wait=200ms
spring.redis.timeout=3000ms

# 缓存配置
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000  # 1小时缓存
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=credential:
spring.cache.redis.use-key-prefix=true
# ===============================
# JPA \u914D\u7F6E
# ===============================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# \u670D\u52A1\u5668\u914D\u7F6E
# ===============================
server.port=8080
server.servlet.context-path=/

# ===============================
# \u65E5\u5FD7\u914D\u7F6E
# ===============================
logging.level.com.query_credential=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# \u5E94\u7528\u914D\u7F6E
# ===============================
spring.main.banner-mode=console
spring.output.ansi.enabled=ALWAYS